services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  enrichment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enrichment-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      Kafka__BootstrapServers: kafka:9092
      Kafka__InputTopic: enrichment-input
      Kafka__ConsumerGroup: enrichment-service-group
      ExternalApi__BaseUrl: https://external-api.example.com
      ExternalApi__RetryCount: 3
      Observability__LogRawMessages: true
      Observability__LogEnrichedMessages: true
      Observability__MetricsPort: 9090
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
